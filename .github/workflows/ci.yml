name: CI

on:
  push:
    branches: [ main, staging, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install .[dev] || pip install . || true
          pip install pytest
      - name: Run tests
        run: |
          pytest -q

  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8 || true
      - name: Run flake8
        run: |
          flake8 || true
